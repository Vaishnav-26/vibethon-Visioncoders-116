<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI-Learn Explorer – Authenticate</title>
  <meta name="description" content="Sign in or create your AI-Learn Explorer student account and start your AI/ML learning journey." />

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            accent:  '#6C63FF',
            accent2: '#00D4FF',
            accent3: '#FF6584',
            dark: {
              900: '#050810',
              800: '#0a0e1a',
              700: '#111827',
            }
          },
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
            display: ['Space Grotesk', 'sans-serif'],
          }
        }
      }
    };
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

  <!-- Custom Styles -->
  <link rel="stylesheet" href="style.css" />
</head>
<body class="dark">

<!-- Animated Mesh Background -->
<div class="bg-mesh"></div>

<!-- Extra floating orbs -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
  <div class="absolute w-96 h-96 rounded-full opacity-20 animate-pulse"
       style="background:radial-gradient(circle,#FF6584,transparent 70%);top:60%;left:70%;filter:blur(60px)"></div>
  <div class="absolute w-72 h-72 rounded-full opacity-15 animate-pulse"
       style="background:radial-gradient(circle,#FFD700,transparent 70%);top:10%;right:20%;filter:blur(50px);animation-delay:3s"></div>
</div>

<!-- Main Container -->
<main class="relative z-10 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md animate-fade-up">

    <!-- Logo / Brand -->
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 rounded-2xl mb-4 pulse-glow"
           style="background:linear-gradient(135deg,#6C63FF,#00D4FF)">
        <i data-lucide="brain-circuit" class="w-8 h-8 text-white"></i>
      </div>
      <h1 class="text-3xl font-bold font-display text-gradient">AI-Learn Explorer</h1>
      <p class="text-sm mt-1" style="color:var(--clr-muted)">Your gateway to AI mastery</p>
    </div>

    <!-- Auth Card -->
    <div class="glass-strong p-8 shadow-2xl">

      <!-- Tab Toggle -->
      <div class="flex gap-2 p-1 rounded-full mb-8"
           style="background:rgba(255,255,255,0.05);border:1px solid var(--clr-border)">
        <button id="tab-signin"
                onclick="switchTab('signin')"
                class="flex-1 py-2 rounded-full text-sm font-semibold transition-all tab-active"
                aria-selected="true">
          Sign In
        </button>
        <button id="tab-signup"
                onclick="switchTab('signup')"
                class="flex-1 py-2 rounded-full text-sm font-semibold transition-all text-gray-400"
                aria-selected="false">
          Sign Up
        </button>
      </div>

      <!-- ── SIGN IN FORM ── -->
      <form id="form-signin" onsubmit="handleSignin(event)" class="space-y-5">

        <div>
          <label class="block mb-1.5 text-xs font-semibold uppercase tracking-wider" style="color:var(--clr-muted)">
            Email Address
          </label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 opacity-50">
              <i data-lucide="mail" class="w-4 h-4"></i>
            </span>
            <input id="signin-email"
                   type="email"
                   placeholder="student@university.edu"
                   class="input-glass pl-10"
                   required />
          </div>
        </div>

        <div>
          <label class="block mb-1.5 text-xs font-semibold uppercase tracking-wider" style="color:var(--clr-muted)">
            Password
          </label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 opacity-50">
              <i data-lucide="lock" class="w-4 h-4"></i>
            </span>
            <input id="signin-password"
                   type="password"
                   placeholder="••••••••"
                   class="input-glass pl-10 pr-10"
                   required />
            <button type="button"
                    onclick="togglePwd('signin-password','eye-si')"
                    class="absolute right-3 top-1/2 -translate-y-1/2 opacity-50 hover:opacity-100 transition-opacity">
              <i id="eye-si" data-lucide="eye" class="w-4 h-4"></i>
            </button>
          </div>
        </div>

        <div class="flex items-center justify-between text-xs">
          <label class="flex items-center gap-2 cursor-pointer" style="color:var(--clr-muted)">
            <input type="checkbox" class="rounded accent-violet-500" /> Remember me
          </label>
          <a href="#" class="hover:text-accent transition-colors" style="color:var(--clr-muted)">Forgot password?</a>
        </div>

        <button type="submit" class="btn-primary w-full text-base" id="btn-signin">
          <i data-lucide="log-in" class="w-4 h-4"></i>
          Sign In
        </button>

        <div id="signin-error" class="hidden text-red-400 text-sm text-center mt-2 p-2 rounded-lg"
             style="background:rgba(239,68,68,0.1)"></div>
      </form>

      <!-- ── SIGN UP FORM ── -->
      <form id="form-signup" onsubmit="handleSignup(event)" class="space-y-4 hidden">

        <!-- Full Name -->
        <div>
          <label class="block mb-1.5 text-xs font-semibold uppercase tracking-wider" style="color:var(--clr-muted)">
            Full Name
          </label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 opacity-50">
              <i data-lucide="user" class="w-4 h-4"></i>
            </span>
            <input id="signup-name"
                   type="text"
                   placeholder="Alexandra Chen"
                   class="input-glass pl-10"
                   required />
          </div>
        </div>

        <!-- Student ID -->
        <div>
          <label class="block mb-1.5 text-xs font-semibold uppercase tracking-wider" style="color:var(--clr-muted)">
            Student ID
          </label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 opacity-50">
              <i data-lucide="id-card" class="w-4 h-4"></i>
            </span>
            <input id="signup-studentid"
                   type="text"
                   placeholder="STU-2024-0042"
                   class="input-glass pl-10"
                   required />
          </div>
        </div>

        <!-- Email -->
        <div>
          <label class="block mb-1.5 text-xs font-semibold uppercase tracking-wider" style="color:var(--clr-muted)">
            Email Address
          </label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 opacity-50">
              <i data-lucide="mail" class="w-4 h-4"></i>
            </span>
            <input id="signup-email"
                   type="email"
                   placeholder="student@university.edu"
                   class="input-glass pl-10"
                   required />
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block mb-1.5 text-xs font-semibold uppercase tracking-wider" style="color:var(--clr-muted)">
            Password
          </label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 opacity-50">
              <i data-lucide="lock" class="w-4 h-4"></i>
            </span>
            <input id="signup-password"
                   type="password"
                   placeholder="Min. 8 characters"
                   class="input-glass pl-10 pr-10"
                   minlength="8"
                   required />
            <button type="button"
                    onclick="togglePwd('signup-password','eye-su')"
                    class="absolute right-3 top-1/2 -translate-y-1/2 opacity-50 hover:opacity-100 transition-opacity">
              <i id="eye-su" data-lucide="eye" class="w-4 h-4"></i>
            </button>
          </div>
        </div>

        <!-- Level Select -->
        <div>
          <label class="block mb-1.5 text-xs font-semibold uppercase tracking-wider" style="color:var(--clr-muted)">
            Learning Level
          </label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 opacity-50 pointer-events-none">
              <i data-lucide="bar-chart-3" class="w-4 h-4"></i>
            </span>
            <select id="signup-level" class="input-glass pl-10 pr-8 appearance-none cursor-pointer">
              <option value="beginner">🌱 Beginner – I'm just starting</option>
              <option value="intermediate">⚡ Intermediate – I know the basics</option>
              <option value="advanced">🚀 Advanced – I'm deep in AI/ML</option>
            </select>
            <span class="absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none opacity-50">
              <i data-lucide="chevron-down" class="w-4 h-4"></i>
            </span>
          </div>
        </div>

        <button type="submit" class="btn-primary w-full text-base" id="btn-signup">
          <i data-lucide="rocket" class="w-4 h-4"></i>
          Create Account
        </button>

        <div id="signup-error" class="hidden text-red-400 text-sm text-center mt-2 p-2 rounded-lg"
             style="background:rgba(239,68,68,0.1)"></div>
      </form>

      <!-- Divider -->
      <div class="flex items-center gap-3 my-6">
        <div class="flex-1 h-px" style="background:var(--clr-border)"></div>
        <span class="text-xs" style="color:var(--clr-muted)">secured by</span>
        <div class="flex-1 h-px" style="background:var(--clr-border)"></div>
      </div>

      <!-- Security Badge -->
      <div class="flex items-center justify-center gap-2 text-xs" style="color:var(--clr-muted)">
        <i data-lucide="shield-check" class="w-4 h-4 text-green-400"></i>
        JWT encrypted · bcrypt hashed · 256-bit secure
      </div>
    </div>

    <!-- Footer -->
    <p class="text-center text-xs mt-6" style="color:var(--clr-muted)">
      © 2024 AI-Learn Explorer · VIBETHON Hackathon Project
    </p>
  </div>
</main>

<!-- Toast -->
<div id="toast"></div>

<script>
  lucide.createIcons();

  const API = window.location.origin + '/api';

  // ── Tab switching ──
  function switchTab(tab) {
    const signin = document.getElementById('form-signin');
    const signup = document.getElementById('form-signup');
    const tabSi  = document.getElementById('tab-signin');
    const tabSu  = document.getElementById('tab-signup');

    if (tab === 'signin') {
      signin.classList.remove('hidden');
      signup.classList.add('hidden');
      tabSi.classList.add('tab-active');    tabSi.classList.remove('text-gray-400');
      tabSu.classList.remove('tab-active'); tabSu.classList.add('text-gray-400');
    } else {
      signup.classList.remove('hidden');
      signin.classList.add('hidden');
      tabSu.classList.add('tab-active');    tabSu.classList.remove('text-gray-400');
      tabSi.classList.remove('tab-active'); tabSi.classList.add('text-gray-400');
    }
  }

  // ── Password visibility ──
  function togglePwd(inputId, iconId) {
    const inp  = document.getElementById(inputId);
    const icon = document.getElementById(iconId);
    if (inp.type === 'password') {
      inp.type = 'text';
      icon.setAttribute('data-lucide', 'eye-off');
    } else {
      inp.type = 'password';
      icon.setAttribute('data-lucide', 'eye');
    }
    lucide.createIcons();
  }

  // ── Toast helper ──
  function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = (type === 'success' ? '✅ ' : '❌ ') + msg;
    el.className = `show ${type}`;
    setTimeout(() => el.className = '', 4000);
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  function clearError(id) {
    document.getElementById(id).classList.add('hidden');
  }

  // ── Sign In ──
  async function handleSignin(e) {
    e.preventDefault();
    clearError('signin-error');
    const btn = document.getElementById('btn-signin');
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader-circle" class="w-4 h-4 animate-spin"></i> Signing in…';
    lucide.createIcons();

    try {
      const res  = await fetch(`${API}/login`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          email:    document.getElementById('signin-email').value.trim(),
          password: document.getElementById('signin-password').value
        })
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Login failed');

      localStorage.setItem('aile_token',   data.token);
      localStorage.setItem('aile_student', JSON.stringify(data.student));
      toast('Welcome back, ' + data.student.name + '!');
      setTimeout(() => window.location.href = '/dashboard', 800);
    } catch (err) {
      showError('signin-error', err.message);
      btn.disabled = false;
      btn.innerHTML = '<i data-lucide="log-in" class="w-4 h-4"></i> Sign In';
      lucide.createIcons();
    }
  }

  // ── Sign Up ──
  async function handleSignup(e) {
    e.preventDefault();
    clearError('signup-error');
    const btn = document.getElementById('btn-signup');
    btn.disabled = true;
    btn.innerHTML = '<i data-lucide="loader-circle" class="w-4 h-4 animate-spin"></i> Creating account…';
    lucide.createIcons();

    try {
      const res  = await fetch(`${API}/register`, {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({
          name:      document.getElementById('signup-name').value.trim(),
          studentID: document.getElementById('signup-studentid').value.trim(),
          email:     document.getElementById('signup-email').value.trim(),
          password:  document.getElementById('signup-password').value,
          level:     document.getElementById('signup-level').value
        })
      });
      const data = await res.json();

      if (!res.ok) throw new Error(data.error || 'Registration failed');

      localStorage.setItem('aile_token',   data.token);
      localStorage.setItem('aile_student', JSON.stringify(data.student));
      toast('Account created! Starting your journey…');
      setTimeout(() => window.location.href = '/dashboard', 900);
    } catch (err) {
      showError('signup-error', err.message);
      btn.disabled = false;
      btn.innerHTML = '<i data-lucide="rocket" class="w-4 h-4"></i> Create Account';
      lucide.createIcons();
    }
  }

  // Redirect if already logged in
  if (localStorage.getItem('aile_token')) {
    window.location.href = '/dashboard';
  }
</script>
</body>
</html>
